<body>
  <script src="flutter_bootstrap.js" async></script>
 <script>
   async function connectMetaMask() {
      if (window.kaia) {
        // すでに接続済みかチェック（これを入れると安定します）
        if (window.kaia.selectedAddress) {
          console.log("Already connected:", window.kaia.selectedAddress);
          return window.kaia.selectedAddress;
        }

        const accounts = await window.kaia.request({
          method: 'kaia_accounts'
        });

        if (accounts && accounts.length > 0) {
          console.log("New connection:", accounts[0]);
          return accounts[0];
        }
        return null;
      } else {
        alert("Wallet not Selected");
        return null;
      }
    }

    async function sendTransactionJS(tx) {
      if (typeof window.kaia === 'undefined') return null;
      try {
    // Reownのrequestとほぼ同じ構造で叩けます
        const finalTx = {
          ...tx,
          gas: "0x493E0", // 300,000 (0xa9059cbb + Tagならこれで十分)
        };
        const txHash = await window.kaia.request({
          method: 'kaia_sendTransaction',
          params: [finalTx], // txはDart側で作ったMapがそのままJSオブジェクトとして渡ります
        });
        return txHash;
      } catch (error) {
        console.error("Transaction Error:", error);
        return null;
      }
    }
 </script>
</body>
