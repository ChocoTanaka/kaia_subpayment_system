<!DOCTYPE html>

<html>
<head>

  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="This is a kaia_subpayment_system subapp">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="kaia_subpayment_system">
  <link rel="apple-touch-icon" href="icons/unifi_Stable_192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>kaia_subpayment_system</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    const discoveredProviders = new Map();

      // 1. イベントリスナーを常時起動
    window.addEventListener("eip6963:announceProvider", (event) => {
      const { info, provider } = event.detail;
      // 重複を防ぎつつマップに格納
      discoveredProviders.set(info.rdns, { info, provider });
    });

      // 2. ウォレットをスキャンして、検出されたリストをFlutterに返す関数
    async function getAvailableWallets() {
      discoveredProviders.clear();
      window.dispatchEvent(new Event("eip6963:requestProvider"));

      // 1000ms（1秒）確実に待つためのPromiseを生成してawaitする
      await new Promise((resolve) => {
        setTimeout(() => {
          resolve(); // 1秒経ったらPromiseを「完了」状態にする
        }, 1000);
      });

      // ここからは1秒後に必ず実行される
      const walletList = [];
      discoveredProviders.forEach((value, rdns) => {
        walletList.push({
          name: value.info.name,
          rdns: rdns,
          icon: value.info.icon
        });
      });
      // async関数のため、自動的にPromiseにラップされてFlutterへ返る
      return walletList;
    }

    // 3. ユーザーが選んだRDNSを指定して直接接続を実行する関数
    async function connectSelectedWallet(rdns) {
      const target = discoveredProviders.get(rdns);
      if (!target) throw new Error("指定されたウォレットが見つかりません");

      // 対象のプロバイダだけで要求を通す（Base等の競合を完全スルー）
      const accounts = await target.provider.request({ method: 'kaia_requestAccounts' });
      return accounts[0];
    }

    async function connectWallet() {
      if (window.klaytn) {
        // すでに接続済みかチェック（これを入れると安定します）
        if (window.klaytn.selectedAddress) {
          console.log("Already connected:", window.klaytn.selectedAddress);
          return window.klaytn.selectedAddress;
        }

        const accounts = await window.klaytn.request({
          method: 'kaia_requestAccounts'
        });

        if (accounts && accounts.length > 0) {
          console.log("New connection:", accounts[0]);
          return accounts[0];
        }
        return null;
      } else {
        alert("Wallet not Selected");
        return null;
      }
    }

    async function sendTransactionJS(tx) {
      if (typeof window.klaytn === 'undefined') return null;
      try {
    // Reownのrequestとほぼ同じ構造で叩けます
        const finalTx = {
          ...tx,
          gas: "0x493E0", // 300,000 (0xa9059cbb + Tagならこれで十分)
        };
        const txHash = await window.klaytn.request({
          method: 'kaia_sendTransaction',
          params: [finalTx], // txはDart側で作ったMapがそのままJSオブジェクトとして渡ります
        });
        return txHash;
      } catch (error) {
        console.error("Transaction Error:", error);
        return null;
      }
    }
 </script>
</body>
</html>
